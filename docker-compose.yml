services:
  netwatch:
    image: ghcr.io/atomnft/netwatch-dashboard:latest
    container_name: netwatch-dashboard
    environment:
      - DEFAULT_SCAN_TARGET=192.168.1.0/24
      - DEFAULT_TOP_PORTS=200
      - APP_PORT=4998
      - SETTINGS_DIR=/app/data
    network_mode: host
    restart: unless-stopped
    volumes:
      - ./data:/app/data